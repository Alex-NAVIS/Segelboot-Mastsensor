<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mast ESP32 Setup</title>
<style>
    body { background-color: #001a26; color: #00e6e6; font-family: "Segoe UI", Arial, sans-serif; margin:0; padding:0; text-align:center;}
    header { background-color: #002b3a; color:#00ffff; padding:15px; font-size:1.6em; font-weight:bold; border-bottom:2px solid #005566;}
    h2.section-title { color:#00ffff; margin-top:20px; font-size:1.3em; border-bottom:1px solid #007a99; display:inline-block; padding-bottom:4px;}
    form { margin:20px auto; width:90%; max-width:400px; text-align:left;}
    label { display:block; margin-top:10px; color:#00e6e6;}
    input, select { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #007a99; background:#003d52; color:#ffffff;}
    button { margin-top:15px; padding:10px 20px; width:100%; background:#007BFF; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold;}
    button:hover { background:#00b8d4; color:#001a26; }
    .status { margin-top:10px; font-weight:bold; color:#00ffcc; text-align:center;}
	.sensor-box {
    background-color: #003d52;
    border: 1px solid #007a99;
    border-radius: 10px;
    padding: 10px;
    margin-top: 15px;
    display: flex;
    flex-direction: column; /* Alles untereinander */
    gap: 8px;               /* Abstand zwischen Feldern */
	}
	.sensor-box div { margin:5px 0; }
	input[type="number"], input[type="password"], select {
    width: 100%;
    padding: 6px 8px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #007a99;
    background: #003d52;
    color: #ffffff;
    box-sizing: border-box; /* Wichtig für volle Breite innerhalb der Box */
    font-size: 1em;
	}
</style>
</head>
<body>
<header>Mast ESP32 Setup</header>

<h2 class="section-title">WLAN & Mast Sensor Einstellungen</h2>

<form id="configForm">
    <label for="ssid">WLAN SSID</label>
    <select id="ssid"></select>

    <label for="password">WLAN Passwort</label>
    <input type="password" id="password" placeholder="Passwort">

    <label for="port">Ziel-Port</label>
    <input type="number" id="port" value="80">

    <div class="sensor-box">
        <div><strong>Wind-Sensoren Abfrageintervall (ms)</strong></div>
        <label for="windSpeedInterval">Geschwindigkeit</label>
        <input type="number" id="windSpeedInterval" value="250">
        <label for="windDirInterval">Richtung</label>
        <input type="number" id="windDirInterval" value="250">
    </div>

    <div class="sensor-box">
        <div><strong>GPS Abfrageintervall (ms)</strong></div>
        <input type="number" id="gpsInterval" value="250">
    </div>

    <div class="sensor-box">
        <div><strong>Mastdaten Sendeintervall (ms)</strong></div>
        <input type="number" id="sendInterval" value="500">
    </div>

    <button type="submit">Speichern & Neustart</button>
</form>

<div class="status" id="status"></div>

<script>
// WLAN Scan
function scanWifi() {
    fetch('/scan')
        .then(res => res.json())
        .then(data => {
            const ssidSelect = document.getElementById('ssid');
            ssidSelect.innerHTML = "";
            data.forEach(ssid => {
                const option = document.createElement('option');
                option.value = ssid;
                option.textContent = ssid;
                ssidSelect.appendChild(option);
            });
        })
        .catch(err => console.error("Scan fehlgeschlagen", err));
}

// Form Submit
document.getElementById('configForm').addEventListener('submit', function(e){
    e.preventDefault();
    const payload = {
        ssid: document.getElementById('ssid').value,
        password: document.getElementById('password').value,
        port: parseInt(document.getElementById('port').value),
        windSpeedInterval: parseInt(document.getElementById('windSpeedInterval').value),
        windDirInterval: parseInt(document.getElementById('windDirInterval').value),
        gpsInterval: parseInt(document.getElementById('gpsInterval').value),
        sendInterval: parseInt(document.getElementById('sendInterval').value)
    };
    fetch('/save', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(payload)
    })
    .then(res => res.text())
    .then(txt => document.getElementById('status').textContent = txt)
    .catch(err => document.getElementById('status').textContent = "Fehler: "+err);
});

scanWifi();
</script>
</body>
</html>
